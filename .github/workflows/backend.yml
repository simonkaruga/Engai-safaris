name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: engaisafaris_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: |
          python -c "from app.main import app; print('✅ App imports OK')"
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/engaisafaris_test
          JWT_SECRET: test-secret-minimum-32-characters-long
          PESAPAL_ENV: sandbox
          PESAPAL_KEY: test
          PESAPAL_SECRET: test
          PESAPAL_IPN_ID: test
          RESEND_API_KEY: test
          AT_USERNAME: sandbox
          AT_API_KEY: test
          ANTHROPIC_API_KEY: test
          FRONTEND_URL: http://localhost:3000
          ALLOWED_ORIGINS: http://localhost:3000
